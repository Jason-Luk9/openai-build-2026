document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

3b063a92-9c56-4975-acc8-07212db6578d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0}\n  ::selection{background:#f3e7e3;color:#1c1b19}\n  a{color:#93362c}\n  a:hover{color:#6f2a22}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"{{ rootStyle }}\">\n\n<sc-if value=\"{{ isLanding }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"{{ headerBarStyle }}\">\n    <div style=\"{{ headerInnerStyle }}\">\n      <div style=\"{{ logoStyle }}\">Singa<span style=\"{{ accentSpanStyle }}\">Path<\u002Fspan><\u002Fdiv>\n      <nav style=\"display:flex;align-items:center;gap:28px\">\n        <a href=\"#\" style=\"{{ navLinkStyle }}\" sc-camel-on-click=\"{{ noop }}\">Mock profiles<\u002Fa>\n        <a href=\"#\" style=\"{{ navLinkStyle }}\" sc-camel-on-click=\"{{ noop }}\">How it works<\u002Fa>\n        <a href=\"#\" style=\"{{ navCtaStyle }}\" sc-camel-on-click=\"{{ goWizard }}\">Build your playbook →<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <main style=\"max-width:1080px;margin:0 auto;padding:0 48px\">\n    <section style=\"{{ heroSectionStyle }}\">\n      <p style=\"{{ eyebrowStyle }}\"><span style=\"{{ accentLineStyle }}\"><\u002Fspan>ASEAN → Singapore<\u002Fp>\n      <h1 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:52px;line-height:1.08;letter-spacing:-0.015em;color:#1c1b19;margin:22px 0 0;max-width:820px\">3–6 months of Singapore market-entry confusion. <span style=\"{{ accentTextStyle }}\">One 5-minute playbook.<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:17px;line-height:1.6;color:#55524a;margin:22px 0 0;max-width:620px\">Entity, visas (COMPASS), licences, tax, banking, timeline — every fact source-backed and last-verified.<\u002Fp>\n      <p style=\"font-size:13.5px;line-height:1.6;color:#8a8880;margin:12px 0 0;max-width:640px\">A deterministic rules engine computes every fact — AI only narrates. Every figure links to MOM, ACRA, IRAS or MAS.<\u002Fp>\n      <div style=\"display:flex;gap:14px;margin-top:32px\">\n        <button style=\"{{ primaryBtnStyle }}\" sc-camel-on-click=\"{{ goWizard }}\">Build your playbook →<\u002Fbutton>\n        <button style=\"{{ secondaryBtnStyle }}\" sc-camel-on-click=\"{{ loadSampleProfile }}\">See a sample playbook<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"{{ profilesSectionStyle }}\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px\">\n        <p style=\"{{ smallLabelStyle }}\">Load a mock profile to see it run<\u002Fp>\n        <a href=\"#\" style=\"{{ accentLinkStyle }}\" sc-camel-on-click=\"{{ goWizard }}\">or start with your own company →<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px\">\n        <sc-for list=\"{{ mockProfiles }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <article style=\"{{ p.cardStyle }}\">\n            <div style=\"font-family:'Newsreader',serif;font-weight:600;font-size:19px;color:#1c1b19\">{{ p.name }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.06em;color:#8a8880;text-transform:uppercase;margin-top:5px\">{{ p.meta }}<\u002Fdiv>\n            <p style=\"font-size:13.5px;line-height:1.55;color:#55524a;margin:14px 0 0;min-height:42px\">{{ p.hook }}<\u002Fp>\n            <a href=\"#\" style=\"{{ p.loadLinkStyle }}\" sc-camel-on-click=\"{{ p.onLoad }}\">Load profile →<\u002Fa>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"{{ howItWorksSectionStyle }}\">\n      <p style=\"{{ smallLabelStyle }} margin-bottom:16px\">How it works<\u002Fp>\n      <div style=\"{{ teaserCardStyle }}\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div>\n            <div style=\"font-family:'Newsreader',serif;font-weight:600;font-size:18px;color:#1c1b19\">Employment Pass — COMPASS score<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.05em;color:#8a8880;margin-top:6px;text-transform:uppercase\">MOM<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"{{ chipEligibleStyle }}\">✓ Eligible<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.6;color:#3a3830;margin:18px 0 0\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:#1c1b19\">62 pts<\u002Fspan> against a <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:#1c1b19\">40 pt<\u002Fspan> qualifying threshold — based on the salary, education and company track record you entered.\n        <\u002Fp>\n        <div style=\"margin-top:18px;padding-top:14px;border-top:1px solid #e2ddd2;font-size:12px;color:#8a8880\">Sources: MOM COMPASS Framework · Last verified Jul 2026<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <div style=\"{{ footerBarStyle }}\">\n    <div style=\"{{ footerInnerStyle }}\">\n      <p style=\"font-size:12.5px;color:#8a8880;margin:0\">General information, not legal advice.<\u002Fp>\n      <div style=\"display:flex;gap:8px\">\n        <sc-for list=\"{{ agencies }}\" as=\"ag\" hint-placeholder-count=\"4\">\n          <span style=\"{{ agencyChipStyle }}\">{{ ag }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isWizard }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"{{ headerBarStyle }}\">\n    <div style=\"{{ headerInnerStyle }}\">\n      <div style=\"{{ logoStyle }}\">Singa<span style=\"{{ accentSpanStyle }}\">Path<\u002Fspan><\u002Fdiv>\n      <a href=\"#\" style=\"font-size:13px;font-weight:600;color:#8a8880\" sc-camel-on-click=\"{{ goLanding }}\">Exit to landing<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <main style=\"{{ wizardMainStyle }}\">\n    <p style=\"{{ eyebrowStyle }}\">SingaPath intake<\u002Fp>\n    <h1 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:32px;color:#1c1b19;margin:16px 0 0;letter-spacing:-0.01em\">Build your Singapore entry plan.<\u002Fh1>\n\n    <div style=\"margin-top:16px;display:flex;justify-content:space-between;font-size:12.5px;color:#8a8880\">\n      <span>Step {{ wizardStep }} of 5<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace\">{{ wizardPercent }}% complete<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-top:8px;height:2px;background:#e2ddd2;position:relative\">\n      <div style=\"{{ progressFillStyle }}\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:36px\">\n      <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"{{ stepLabelStyle }}\">Where is your company based today?<\u002Fp>\n        <sc-for list=\"{{ countryOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n          <button style=\"{{ opt.style }}\" sc-camel-on-click=\"{{ opt.onSelect }}\">{{ opt.label }}<span style=\"{{ opt.dotStyle }}\"><\u002Fspan><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isStep2 }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"{{ stepLabelStyle }}\">What industry are you in?<\u002Fp>\n        <sc-for list=\"{{ industryOptions }}\" as=\"opt\" hint-placeholder-count=\"6\">\n          <button style=\"{{ opt.style }}\" sc-camel-on-click=\"{{ opt.onSelect }}\">{{ opt.label }}<span style=\"{{ opt.dotStyle }}\"><\u002Fspan><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isStep3 }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"{{ stepLabelStyle }}\">What's the purpose of your Singapore entity?<\u002Fp>\n        <sc-for list=\"{{ purposeOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n          <button style=\"{{ opt.style }}\" sc-camel-on-click=\"{{ opt.onSelect }}\">{{ opt.label }}<span style=\"{{ opt.dotStyle }}\"><\u002Fspan><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isStep4 }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"{{ stepLabelStyle }}\">Team &amp; projected revenue<\u002Fp>\n        <label style=\"{{ fieldLabelStyle }}\">Founders relocating to Singapore<\u002Flabel>\n        <input type=\"number\" min=\"0\" style=\"{{ inputStyle }}\" value=\"{{ wizardAnswers.foundersRelocating }}\" sc-camel-on-change=\"{{ onFoundersChange }}\">\n        <label style=\"{{ fieldLabelStyle }} margin-top:20px\">Staff relocating to Singapore<\u002Flabel>\n        <input type=\"number\" min=\"0\" style=\"{{ inputStyle }}\" value=\"{{ wizardAnswers.staffRelocating }}\" sc-camel-on-change=\"{{ onStaffChange }}\">\n        <label style=\"{{ fieldLabelStyle }} margin-top:20px\">Projected annual Singapore revenue (S$)<\u002Flabel>\n        <input type=\"number\" min=\"0\" step=\"10000\" style=\"{{ inputStyle }}\" value=\"{{ wizardAnswers.projectedRevenue }}\" sc-camel-on-change=\"{{ onRevenueChange }}\">\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isStep5 }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"{{ stepLabelStyle }}\">Do you have EntrePass-qualifying evidence?<\u002Fp>\n        <sc-for list=\"{{ evidenceOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n          <button style=\"{{ opt.style }}\" sc-camel-on-click=\"{{ opt.onToggle }}\">{{ opt.label }}<span style=\"{{ opt.checkStyle }}\">{{ opt.checkMark }}<\u002Fspan><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:40px;display:flex;justify-content:space-between\">\n      <button style=\"{{ backBtnStyle }}\" sc-camel-on-click=\"{{ wizardBack }}\">Back<\u002Fbutton>\n      <button style=\"{{ primaryBtnStyle }}\" sc-camel-on-click=\"{{ wizardNextAction }}\">{{ nextButtonLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n    <p style=\"text-align:center;font-size:12px;color:#8a8880;margin-top:24px\">General information, not legal advice.<\u002Fp>\n  <\u002Fmain>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isPlaybook }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"{{ headerBarStyle }}\">\n    <div style=\"{{ playbookHeaderInnerStyle }}\">\n      <div style=\"{{ logoStyle }}\">Singa<span style=\"{{ accentSpanStyle }}\">Path<\u002Fspan><\u002Fdiv>\n      <nav style=\"display:flex;align-items:center;gap:28px\">\n        <a href=\"#\" style=\"{{ navLinkStyle }}\" sc-camel-on-click=\"{{ goLanding }}\">Mock profiles<\u002Fa>\n        <a href=\"#\" style=\"{{ navCtaStyle }}\" sc-camel-on-click=\"{{ goLanding }}\">View current playbook →<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <main style=\"max-width:900px;margin:0 auto;padding:48px 48px 64px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap\">\n      <div>\n        <p style=\"{{ eyebrowStyle }}\">Your playbook — {{ profile.name }} · {{ profile.meta }}<\u002Fp>\n        <h1 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:34px;color:#1c1b19;margin:14px 0 0;letter-spacing:-0.01em\">Facts first. Guidance as it arrives.<\u002Fh1>\n        <p style=\"font-size:14.5px;line-height:1.6;color:#55524a;margin:14px 0 0;max-width:560px\">Every fact below comes from the rules engine. Narratives are constrained to these facts and may flag uncertainty.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:10px\">\n        <button style=\"{{ pdfBtnStyle }}\">↓ Download PDF<\u002Fbutton>\n        <a href=\"#\" style=\"{{ accentSmallLinkStyle }}\" sc-camel-on-click=\"{{ goLanding }}\">Change profile<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"{{ statusSummaryStyle }}\">\n      <span style=\"{{ chipEligibleStyle }}\">✓ {{ eligibleCount }} eligible<\u002Fspan>\n      <sc-if value=\"{{ hasFlags }}\" hint-placeholder-val=\"{{ false }}\">\n        <span style=\"{{ chipFlagStyle }}\">⚠ {{ flagCount }} to review<\u002Fspan>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <div style=\"{{ tabBarStyle }}\">\n      <sc-for list=\"{{ profile.tabs }}\" as=\"tab\" hint-placeholder-count=\"7\">\n        <button style=\"{{ tab.style }}\" sc-camel-on-click=\"{{ tab.onClick }}\"><span style=\"{{ tab.dotStyle }}\"><\u002Fspan>{{ tab.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:20px\">\n      <section style=\"{{ sectionCardStyle }}\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:12px\">\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:19px;color:#1c1b19;margin:0\">{{ activeSection.label }}<\u002Fh2>\n          <span style=\"{{ activeSection.chipStyle }}\">{{ activeSection.chipLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"{{ factsBoxStyle }}\">\n          <p style=\"{{ factsLabelStyle }}\">Facts<\u002Fp>\n          <ul style=\"margin:8px 0 0;padding-left:18px;font-size:13.5px;line-height:1.65;color:#3a3830\">\n            <sc-for list=\"{{ activeSection.facts }}\" as=\"f\" hint-placeholder-count=\"3\">\n              <li>{{ f }}<\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.65;color:#3a3830;margin:16px 0 0\">{{ activeSection.summary }}<\u002Fp>\n        <sc-if value=\"{{ activeSection.hasCallout }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"{{ calloutStyle }}\">{{ activeSection.callout }}<\u002Fp>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ activeSection.hasNextSteps }}\" hint-placeholder-val=\"{{ false }}\">\n          <ul style=\"margin:14px 0 0;padding-left:18px;font-size:13.5px;line-height:1.65;color:#3a3830\">\n            <sc-for list=\"{{ activeSection.nextSteps }}\" as=\"step\" hint-placeholder-count=\"2\">\n              <li>{{ step }}<\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ activeSection.hasUncertainty }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"font-size:12.5px;color:#93641b;margin:14px 0 0\">Uncertainty: {{ activeSection.uncertainty }}<\u002Fp>\n        <\u002Fsc-if>\n        <div style=\"margin-top:16px;padding-top:12px;border-top:1px solid #e2ddd2;font-size:12px;color:#8a8880\">Sources: {{ activeSection.source }} · Last verified Jul 2026<\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <a href=\"#\" style=\"{{ accentLinkBlockStyle }}\" sc-camel-on-click=\"{{ goLanding }}\">← Back to SingaPath<\u002Fa>\n  <\u002Fmain>\n  <div style=\"{{ footerBarStyle }}\">\n    <div style=\"{{ playbookFooterInnerStyle }}\">\n      <p style=\"font-size:12.5px;color:#8a8880;margin:0\">General information, not legal advice.<\u002Fp>\n      <div style=\"display:flex;gap:8px\">\n        <sc-for list=\"{{ agencies }}\" as=\"ag\" hint-placeholder-count=\"4\">\n          <span style=\"{{ agencyChipStyle }}\">{{ ag }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#93362c&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#93362c&quot;,&quot;#0f766e&quot;,&quot;#1e3a5f&quot;,&quot;#2f6f4e&quot;],&quot;section&quot;:&quot;Theme&quot;},&quot;cardRadius&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:3,&quot;min&quot;:0,&quot;max&quot;:16,&quot;step&quot;:1,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;comfortable&quot;,&quot;options&quot;:[&quot;comfortable&quot;,&quot;compact&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nconst COUNTRIES = ['Indonesia', 'Vietnam', 'Malaysia', 'Thailand', 'Philippines'];\nconst INDUSTRIES = ['F&B', 'SaaS', 'Retail', 'Medical devices', 'Fintech', 'Other'];\nconst PURPOSES = ['Regional HQ', 'Fundraising hub', 'Operational base', 'IP holding', 'Trading company'];\nconst EVIDENCE = ['VC-backed', 'Own intellectual property', 'Award recognition', 'None of the above'];\n\nconst PROFILES = {\n  'warung-digital': {\n    id: 'warung-digital', name: 'Warung Digital', meta: 'Indonesia · F&B brand',\n    hook: \"Opening a Singapore outlet to reach regional distributors.\",\n    sections: [\n      { key: 'entity', label: 'Entity', source: 'ACRA BizFile',\n        facts: ['Industry: F&B; purpose: local operations / regional pilot.', 'Relocating founders/staff: 1 / 3.', 'Recommended structure: Private Limited Company (Pte Ltd).', 'ACRA director requirement: at least one Singapore-resident director.'],\n        summary: 'A Pte Ltd suits a hawker-concept pilot with regional ambitions — full foreign ownership, limited liability, and eligibility for the Startup Tax Exemption from year one.',\n        callout: 'Appoint a nominee director before filing — BizFile+ registration typically completes in 1–3 business days.',\n        nextSteps: ['Register via ACRA\\u2019s BizFile+ portal.', 'Appoint a resident director and corporate secretary within 6 months.'], uncertainty: '', chip: 'eligible' },\n      { key: 'visa', label: 'Visa and COMPASS', source: 'MOM',\n        facts: ['Founder evidence: accelerator-backed (Jakarta cohort).', 'EntrePass innovator criterion: incubator/accelerator acceptance.', 'Basis: EntrePass qualifying path, not COMPASS.'],\n        summary: 'Your Jakarta accelerator backing satisfies EntrePass Path A directly — no COMPASS scoring applies to entrepreneur passes.',\n        callout: 'File the EntrePass application citing the accelerator\\u2019s letter of acceptance.',\n        nextSteps: ['Gather the accelerator acceptance letter and cohort proof.'], uncertainty: 'EntrePass approval remains subject to MOM\\u2019s final assessment of the accelerator\\u2019s recognised status.', chip: 'eligible' },\n      { key: 'licenses', label: 'Licences', source: 'SFA / NEA / URA / SCDF / MUIS',\n        facts: ['SFA Food Shop Licence — S$195/yr — 14 working days.', 'NEA Food Hygiene Inspection — free — on-site visit.', 'URA Planning Use Approval — S$215 — varies by unit.', 'SCDF Fire Safety Certificate — varies — 4–6 weeks.', 'MUIS Halal Certification (optional) — from S$510 — 3–6 months.'],\n        summary: 'Four agencies gate a hawker-style concept — secure your lease before applying, since URA approval is tied to the specific unit address.',\n        callout: 'Submit SFA, NEA and SCDF together via GoBusiness Licence2Start for faster processing.',\n        nextSteps: ['Confirm the unit\\u2019s planning use before signing any lease.', 'Plan kitchen layout around halal storage separation if pursuing MUIS.'], uncertainty: 'Halal certification timeline (3–6 months) is the long pole if required for launch.', chip: 'flag' },\n      { key: 'tax', label: 'Tax and incentives', source: 'IRAS',\n        facts: ['Startup Tax Exemption: 75% off first S$100K profit, 50% off next S$100K (years 1–3).', 'Effective rate on first S$200K: ~5.7% vs statutory 17%.', 'DTA Singapore–Indonesia: dividend withholding 10%.'],\n        summary: 'The startup exemption applies automatically — no application needed — and the Indonesia DTA reduces withholding on dividends sent home.',\n        callout: '', nextSteps: ['Track qualifying profit against the exemption bands from year one.'], uncertainty: '', chip: 'eligible' },\n      { key: 'banking', label: 'Banking', source: 'DBS / Aspire / Airwallex',\n        facts: ['DBS/UOB/OCBC: 2–4 week approval, ~60–70% success for foreign-owned new companies.', 'Aspire / Airwallex: apply online, approval in 2–5 days.', 'GoBusiness grant disbursement requires a local bank account.'],\n        summary: 'Start with Aspire or Airwallex to unblock payment collection immediately, and run a DBS application in parallel for grant eligibility.',\n        callout: 'Switch to a local bank once approved — GoBusiness grants only disburse to Singapore bank accounts.',\n        nextSteps: ['Open an Aspire or Airwallex account in week 1.'], uncertainty: '', chip: 'eligible' },\n      { key: 'timeline', label: 'Timeline', source: '—',\n        facts: ['Week 1–2: ACRA incorporation (S$400–600) + registered office + secretary.', 'Week 2–3: Open Aspire/Airwallex; submit DBS application.', 'Week 3–6: Apply for SFA/NEA/SCDF licences via GoBusiness.', 'Total first-year cost estimate: S$8,000–S$14,000.'],\n        summary: 'Licensing is the critical path here, not incorporation — sequence the lease and SFA application as early as week 2.',\n        callout: '', nextSteps: [], uncertainty: '', chip: 'neutral' },\n      { key: 'risk', label: 'Risk matrix', source: '—',\n        facts: ['Lease signed before URA approval — High likelihood / High impact.', 'Halal certification timeline slippage — Medium / Medium.', 'Foreign-owned bank rejection — Medium / Medium.'],\n        summary: 'The single biggest failure mode for F&B operators is signing a lease before confirming planning use — verify the unit first.',\n        callout: '', nextSteps: [], uncertainty: '', chip: 'flag' },\n    ],\n  },\n  'vietstack': {\n    id: 'vietstack', name: 'VietStack', meta: 'Vietnam · B2B SaaS',\n    hook: 'Relocating two founders on Employment Passes.',\n    sections: [\n      { key: 'entity', label: 'Entity', source: 'ACRA BizFile',\n        facts: ['Industry: SaaS; purpose: regional HQ / fundraising vehicle.', 'Relocating founders/staff: 2 / 8.', 'Recommended structure: Private Limited Company (Pte Ltd).', 'ACRA director requirement: at least one director.'],\n        summary: 'A Pte Ltd is the standard fundraising vehicle for Singapore/US investors — a Branch Office won\\u2019t stand alone as a legal entity.',\n        callout: 'Use your VC-backing evidence when preparing the EntrePass application.',\n        nextSteps: ['Appoint at least one director to satisfy ACRA\\u2019s incorporation requirement.', 'File the EntrePass innovator-track application citing the VC funding round.'],\n        uncertainty: 'EntrePass approval remains subject to MOM assessment.', chip: 'eligible' },\n      { key: 'visa', label: 'Visa and COMPASS', source: 'MOM COMPASS Framework',\n        facts: ['Relocating team: 10 people (2 founders, 8 staff).', 'COMPASS score: 62 / 40 points to pass.', 'Small-firm rule: applies (fewer than 25 PMET employees).', 'C1 Salary 20/20 · C2 Qualifications 20/20 · C3 Diversity 10/10 (small-firm neutral) · C4 Local hiring 12/20.'],\n        summary: '62 points clears the 40-point threshold comfortably. The small-firm rule neutralises the same-nationality diversity criterion until you cross 25 PMET employees.',\n        callout: 'Once headcount passes 25 PMETs, diversity scoring kicks in — plan a mixed-nationality hire before then.',\n        nextSteps: ['Lock in salaries at or above the 55th percentile for your SSIC code.', 'Track PMET headcount against the 25-employee small-firm threshold.'], uncertainty: '', chip: 'eligible' },\n      { key: 'licenses', label: 'Licences', source: 'GoBusiness',\n        facts: ['No industry-specific licence required for SaaS operations.', 'GST registration required only if projected revenue exceeds S$1M/year.', 'Voluntary GST registration available earlier to claim input tax.'],\n        summary: 'SaaS is one of the lightest-touch verticals in Singapore — no sector licence gates you, only standard tax registration thresholds.',\n        callout: '', nextSteps: [], uncertainty: '', chip: 'eligible' },\n      { key: 'tax', label: 'Tax and incentives', source: 'IRAS / EDB',\n        facts: ['Startup Tax Exemption: 75% off first S$100K profit, 50% off next S$100K (years 1–3).', 'DTA Singapore–Vietnam: dividend withholding 10%, royalty withholding 10%.', 'Startup SG Founder Grant: S$50,000 co-investment — requires an SG citizen/PR co-founder.'],\n        summary: 'If you bring on a Singapore co-founder, the Startup SG Founder Grant is effectively free capital on top of the standard exemptions.',\n        callout: '', nextSteps: ['Evaluate recruiting a Singapore-based co-founder to unlock the Founder Grant.'], uncertainty: '', chip: 'eligible' },\n      { key: 'banking', label: 'Banking', source: 'DBS / Airwallex',\n        facts: ['DBS/UOB/OCBC: 2–4 week approval for foreign-owned new companies.', 'Airwallex: multi-currency accounts, strong for ASEAN payouts.', 'Common rejection reason: majority foreign ownership without local nexus.'],\n        summary: 'Airwallex\\u2019s multi-currency support suits a Vietnam–Singapore–US fundraising structure better than a single-currency digital bank.',\n        callout: '', nextSteps: ['Open Airwallex while the DBS application processes in parallel.'], uncertainty: '', chip: 'eligible' },\n      { key: 'timeline', label: 'Timeline', source: '—',\n        facts: ['Week 1–2: ACRA incorporation + nominee director if needed.', 'Week 2–3: Airwallex account; DBS application submitted.', 'Week 6–10: Employment Pass / EntrePass issued; founders relocate.', 'Total first-year cost estimate: S$10,000–S$18,000.'],\n        summary: 'Visa processing (8 weeks) is the critical path for a founder-relocation timeline, not incorporation.', callout: '', nextSteps: [], uncertainty: '', chip: 'neutral' },\n      { key: 'risk', label: 'Risk matrix', source: '—',\n        facts: ['All-Vietnamese founding team flagged on future diversity scoring — Medium likelihood / Low impact today.', 'Bank rejection on foreign-ownership grounds — Medium / Medium.', 'EntrePass rejected, falls back to slower EP path — Low / Medium.'],\n        summary: 'Today\\u2019s biggest exposure is tomorrow\\u2019s: model your COMPASS score again once headcount crosses 25 PMETs.', callout: '', nextSteps: [], uncertainty: '', chip: 'flag' },\n    ],\n  },\n  'payflip': {\n    id: 'payflip', name: 'PayFlip', meta: 'Philippines · Fintech',\n    hook: 'Assessing a MAS licence path before expansion.',\n    sections: [\n      { key: 'entity', label: 'Entity', source: 'ACRA BizFile',\n        facts: ['Industry: Fintech; purpose: MAS-licensed cross-border payments.', 'Relocating founders/staff: 2 / 4.', 'Recommended structure: Private Limited Company (Pte Ltd).', 'MAS licensing requires a Singapore-incorporated entity before application.'],\n        summary: 'MAS licensing requires incorporation first — sequence ACRA registration before any Major Payment Institution filing.',\n        callout: '', nextSteps: ['Incorporate via ACRA before submitting the MAS licence application.'], uncertainty: '', chip: 'eligible' },\n      { key: 'visa', label: 'Visa and COMPASS', source: 'MOM',\n        facts: ['Founder evidence: seed-funded, Manila-based fund.', 'EntrePass criterion: recognised VC/government-backed investor.', 'Fintech Regulatory Sandbox eligibility: confirmed for cross-border payment services.'],\n        summary: 'Seed funding from a recognised investor supports the EntrePass innovator track for the relocating founder.',\n        callout: '', nextSteps: ['File EntrePass citing the seed round and investor eligibility.', 'Register interest in the Fintech Regulatory Sandbox alongside the MAS application.'],\n        uncertainty: 'EntrePass approval remains subject to MOM assessment of investor eligibility.', chip: 'eligible' },\n      { key: 'licenses', label: 'Licences', source: 'MAS',\n        facts: ['MAS Major Payment Institution Licence — required for cross-border payment services.', 'Processing time: typically 6–12 months from complete application.', 'Ongoing compliance: AML/CFT framework, capital adequacy, annual audit.'],\n        summary: 'The MPI licence is the long pole in your timeline — begin the application in parallel with incorporation, not after.',\n        callout: 'Engage a compliance advisor early; MAS applications are commonly returned for incomplete AML documentation.',\n        nextSteps: ['Draft the AML/CFT policy framework before submission.', 'Budget for the licensing application\\u2019s 6–12 month runway.'], uncertainty: '', chip: 'flag' },\n      { key: 'tax', label: 'Tax and incentives', source: 'IRAS',\n        facts: ['Startup Tax Exemption: 75% off first S$100K profit, 50% off next S$100K (years 1–3).', 'GST registration required once revenue exceeds S$1M/year.', 'Financial services can carry GST treatment nuances on specific revenue lines.'],\n        summary: 'Standard startup exemptions apply, but payment-services revenue can carry GST treatment nuances worth confirming with IRAS directly.',\n        callout: '', nextSteps: [], uncertainty: 'GST treatment of specific payment-service revenue lines needs IRAS confirmation.', chip: 'eligible' },\n      { key: 'banking', label: 'Banking', source: 'MAS / DBS / Airwallex',\n        facts: ['Traditional banks flag payment-services/fintech as higher AML risk — longer diligence.', 'Digital banks (Aspire, Airwallex) commonly used for operating accounts pre-licence.', 'A MAS-regulated entity typically requires a dedicated safeguarding account once licensed.'],\n        summary: 'Expect longer bank diligence given the AML risk flag on payment services — plan an operating account with a digital bank while the MAS licence is pending.',\n        callout: '', nextSteps: ['Open an Aspire or Airwallex operating account immediately.'], uncertainty: '', chip: 'flag' },\n      { key: 'timeline', label: 'Timeline', source: '—',\n        facts: ['Week 1–2: ACRA incorporation.', 'Week 2–4: MAS MPI licence application submitted.', 'Month 6–12: MAS licence decision.', 'Total first-year cost estimate: S$15,000–S$30,000 (incl. compliance advisory).'],\n        summary: 'This is the longest runway of the three profiles — the MAS licence, not incorporation, sets your real go-live date.', callout: '', nextSteps: [], uncertainty: '', chip: 'neutral' },\n      { key: 'risk', label: 'Risk matrix', source: '—',\n        facts: ['MAS licence delayed or rejected on AML grounds — Medium likelihood / High impact.', 'Banking relationship strained during pre-licence period — Medium / Medium.', 'Regulatory Sandbox exit terms unclear pre-licence — Low / Medium.'],\n        summary: 'The MAS licence is both the product\\u2019s core asset and its biggest single risk — resource compliance advisory from day one.', callout: '', nextSteps: [], uncertainty: '', chip: 'flag' },\n    ],\n  },\n};\n\nfunction tintOf(hex) {\n  const h = hex.replace('#', '');\n  const r = parseInt(h.substring(0, 2), 16), g = parseInt(h.substring(2, 4), 16), b = parseInt(h.substring(4, 6), 16);\n  const mix = (c) => Math.round(c + (255 - c) * 0.86);\n  return 'rgb(' + mix(r) + ',' + mix(g) + ',' + mix(b) + ')';\n}\n\nfunction buildCustomProfile(answers) {\n  const base = JSON.parse(JSON.stringify(PROFILES['vietstack']));\n  base.id = 'custom';\n  base.name = 'Your company';\n  base.meta = (answers.homeCountry || 'Indonesia') + ' · ' + (answers.industry || 'SaaS');\n  base.sections[0].facts = [\n    'Industry: ' + (answers.industry || 'SaaS') + '; purpose: ' + (answers.entityPurpose || 'Regional HQ') + '.',\n    'Relocating founders/staff: ' + (answers.foundersRelocating ?? 2) + ' / ' + (answers.staffRelocating ?? 5) + '.',\n    'Projected Singapore revenue: S$' + Number(answers.projectedRevenue ?? 500000).toLocaleString('en-SG') + '/year.',\n    'Recommended structure: Private Limited Company (Pte Ltd).',\n  ];\n  base.sections[0].summary = 'Based on the profile you entered, a Pte Ltd gives full foreign ownership, limited liability, and access to the Startup Tax Exemption from year one.';\n  const evidence = answers.entrePassEvidence || [];\n  base.sections[1].facts = [\n    'Relocating team: ' + ((answers.foundersRelocating ?? 2) + (answers.staffRelocating ?? 5)) + ' people.',\n    'EntrePass evidence supplied: ' + (evidence.length ? evidence.join(', ') : 'none — Employment Pass path likely applies instead.'),\n  ];\n  return base;\n}\n\nclass Component extends DCLogic {\n  state = {\n    screen: 'landing',\n    wizardStep: 1,\n    wizardAnswers: { homeCountry: 'Indonesia', industry: 'SaaS', entityPurpose: 'Regional HQ', foundersRelocating: 2, staffRelocating: 5, projectedRevenue: 500000, entrePassEvidence: [] },\n    profileId: 'vietstack',\n    activeSectionKey: 'entity',\n  };\n\n  goLanding = () => this.setState({ screen: 'landing' });\n  goWizard = () => this.setState({ screen: 'wizard', wizardStep: 1 });\n  loadSampleProfile = () => this.setState({ screen: 'playbook', profileId: 'vietstack', activeSectionKey: 'entity' });\n  loadMockProfile = (id) => this.setState({ screen: 'playbook', profileId: id, activeSectionKey: 'entity' });\n  setActiveSection = (key) => this.setState({ activeSectionKey: key });\n  noop = (e) => e && e.preventDefault && e.preventDefault();\n\n  wizardBack = () => this.setState((s) => ({ wizardStep: Math.max(1, s.wizardStep - 1) }));\n  wizardNextAction = () => {\n    if (this.state.wizardStep >= 5) {\n      this.setState({ screen: 'playbook', profileId: 'custom', activeSectionKey: 'entity' });\n    } else {\n      this.setState((s) => ({ wizardStep: Math.min(5, s.wizardStep + 1) }));\n    }\n  };\n  setField = (key, value) => this.setState((s) => ({ wizardAnswers: { ...s.wizardAnswers, [key]: value } }));\n  toggleEvidence = (label) => this.setState((s) => {\n    const cur = s.wizardAnswers.entrePassEvidence || [];\n    const next = cur.includes(label) ? cur.filter((x) => x !== label) : [...cur, label];\n    return { wizardAnswers: { ...s.wizardAnswers, entrePassEvidence: next } };\n  });\n\n  renderVals() {\n    const
